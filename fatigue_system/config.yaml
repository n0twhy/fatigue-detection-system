# =============================================================================
# 疲劳检测与预警系统 —— 全局配置文件（唯一可调参数来源）
# -----------------------------------------------------------------------------
# 铁律：代码中不出现魔法数字，所有阈值/权重/窗口长度/路径都在此定义。
# 本文件默认值取自开发规格书 §5；运行时会被"个性化基线校准"与调参进一步覆盖。
# 每个分组标注了其生效的里程碑（M0..M6），M0 阶段实际只用到 [video] 分组。
# =============================================================================

# ------------------------------- 视频源（M0 生效）----------------------------
video:
  default_source: camera        # 启动默认源：camera（摄像头）| file（视频文件）
  camera_index: 0               # 默认摄像头设备索引（对应 /dev/video0）
  target_fps: 20                # 目标帧率（主循环节拍，规格书要求 ≥15fps）
  frame_width: 640              # 采集/显示宽度（像素）
  frame_height: 480             # 采集/显示高度（像素）
  camera_fourcc: MJPG           # 摄像头采集编码。MJPG 为压缩流、带宽低：
                                # usbip 把摄像头转发进 WSL2 时必须用 MJPG，
                                # 否则默认 YUYV 未压缩流带宽过大、读帧 select 超时。
                                # 原生 Windows/Linux 也普遍支持；置空("")则用驱动默认。
  camera_capture_thread: true   # 摄像头采集放独立线程（持续 drain、GUI 只取最新帧）。
                                # usbip 摄像头在 QTimer 间歇式 read() 下单次阻塞 ~170ms
                                # （GUI 被拖到 ~5fps），独立线程后帧率由处理能力决定。
                                # 仅影响摄像头源；视频文件仍由定时器按源帧率逐帧读。
  camera_read_timeout_sec: 2.0  # 等待采集线程产出新帧的超时（秒）；超时视为相机
                                # 断开/异常，帧循环将停止。正常运行远达不到此值。

# ------------------------------- 界面（M0 生效）-----------------------------
ui:
  # 中文界面字体文件路径；留空("")则自动探测：
  # 优先 Windows 字体（WSL 可访问 /mnt/c/Windows/Fonts，如微软雅黑 msyh.ttc），
  # 其次 Linux 的 Noto CJK / 文泉驿。找不到时界面中文会显示为方块。
  font_path: ""

# --------------------------- MediaPipe FaceMesh（M1）-------------------------
facemesh:
  max_num_faces: 1              # 最多检测人脸数（疲劳检测针对单人）
  refine_landmarks: false       # 关闭虹膜精修。实测开启会整体改变 EAR 数值尺度
                                # (睁眼 EAR 0.30→0.17)、打乱既有阈值，故保持关闭以维持
                                # 一致的 EAR 尺度；眼部灵敏度改由基线校准+闭眼阈值调节。
  min_detection_confidence: 0.5 # 人脸检测置信度阈值
  min_tracking_confidence: 0.5  # 关键点跟踪置信度阈值

# ------------------------------- 眼部特征（M1/M2）----------------------------
eye:
  ear_closed_thresh: 0.21       # EAR 低于此值视为闭眼（无基线时用此绝对阈值）
  ear_closed_ratio: 0.6         # 有基线时，闭眼阈值=本人睁眼EAR均值×此比例（个性化，§3延伸③）
  blink_min_duration_sec: 0.06  # 眨眼去抖：闭眼段短于此时长(秒)不计为眨眼。
                                # 用时间戳判定故对帧率自适应：30fps 下等效旧
                                # blink_min_frames=2（单帧33ms毛刺仍滤除）；低帧率
                                # (usbip暗光~8fps)下单帧闭眼(125ms)也能计数——按帧数
                                # 去抖在低帧率下会让眨眼永远检不出（正常眨眼全闭合
                                # 仅100~150ms，8fps凑不满2帧），故弃用 blink_min_frames。
  perclos_window_sec: 30        # PERCLOS 统计滑窗长度（秒）
  blink_window_sec: 60          # 眨眼率统计滑窗长度（秒）

# ------------------------------- 嘴部特征（M1/M2）----------------------------
mouth:
  mar_yawn_thresh: 0.18         # MAR 高于此值且持续视为哈欠。
                                # 本项目 MAR 公式对三组垂直对取均值（两侧对张开幅度
                                # 远小于中央对），数值尺度偏低：用户实测 闭嘴≈0.02、
                                # 哈欠峰值≈0.3，故取峰值的~60%。规格书默认 0.6 是
                                # "仅中央对"公式的尺度，对本公式永远达不到。
                                # 调参：哈欠漏检→降到 0.15；说话误报→升到 0.22
                                # （还有 1.5s 持续时长兜底，短暂张口不会误报）。
  yawn_min_duration_sec: 1.5    # 张口持续超过此秒数才判定为一次哈欠
  yawn_window_sec: 60           # 哈欠计数滑窗长度（秒）

# ------------------------------ 头部姿态（M1/M2）-----------------------------
head:
  pitch_lower_thresh_deg: 15    # 相对基线的低头俯仰角阈值（度）
  yaw_tilt_thresh_deg: 20       # 相对基线的偏头偏航角阈值（度）
  nod_window_sec: 10            # 点头检测滑窗长度（秒）
  nod_amplitude_deg: 5          # 点头判定：俯仰角偏离窗口均值超过此幅度记为一次头部摆动

# --------------------------- 实时 rPPG 生理特征（M4）-------------------------
rppg:
  enable: true                  # 是否启用实时心率子分（关闭则融合退化为基础模型）
  buffer_sec: 10                # 滚动 RGB 缓冲长度（秒），供 POS 估计心率
  update_interval_sec: 1.0      # 心率更新间隔（秒），后台约每 1s 估计一次
  bandpass_low_hz: 0.7          # 带通滤波下限（Hz），约 42 bpm
  bandpass_high_hz: 3.0         # 带通滤波上限（Hz），约 180 bpm
  roi: cheeks_nose              # 肤色 ROI 选择：面颊 + 鼻部
  resample_fs: 30               # 重采样目标频率(Hz)：相机供帧间隔不均匀，POS/FFT 前
                                # 先按帧时间戳线性重采样到均匀网格，否则频率轴失真
  pos_win_sec: 1.6              # POS 滑窗长度(秒)，取自 Wang 2017 论文推荐值
  min_buffer_ratio: 0.8         # 缓冲填充比例低于此不出数（刚启动/刚切源时不给假 HR）
  max_gap_sec: 1.0              # 缓冲内相邻帧间隔超过此值（长时间丢脸）不出数

# --------------------------- 个性化基线校准（M2）----------------------------
calibration:
  duration_sec: 30              # 启动时采集清醒态基线的时长（秒）
  enable: true                  # 是否启用个性化基线校准（三点延伸之一）

# ----------------------------- 多特征加权融合（M3）--------------------------
fusion:
  update_interval_sec: 1.0      # 融合评分/报警状态机的评估节拍（秒，按帧时间戳判定）。
                                # alarm_consecutive_windows 按此节拍计数：3窗×1s=3s。
  weights:                      # 各子分权重，需满足 Σw=1；physio 缺失(M4前)时按剩余
    eye: 0.45                   # 权重归一化 → 实际 眼0.529/嘴0.294/头0.176，
    mouth: 0.25                 # 退化为任务书基础模型。
    head: 0.15
    physio: 0.15
  level_thresholds:             # 融合分 S∈[0,1] 的四级分级边界。
                                # 调参依据（M4 前 physio 缺失、权重归一化后）：
                                #   纯持续闭眼：眼子分=1 → S≈0.53，须落"中度"→ moderate<0.53
                                #   （规格书初始值 0.55 会让闭眼场景永远到不了中度）；
                                #   综合疲劳（眼+嘴+头全高）：S≈0.85 → 须落"重度"；
                                #   正常状态噪声 S≲0.15 → mild 留足余量防误报。
    mild: 0.25                  # ≥ 此值为"轻度疲劳"
    moderate: 0.50              # ≥ 此值为"中度疲劳"
    severe: 0.70                # ≥ 此值为"重度疲劳"
  smoothing_alpha: 0.3          # 评分 EMA 指数平滑系数（越小越平滑）
  alarm_consecutive_windows: 3  # 连续 N 个窗口判为重度才触发报警（防误报）
  alarm_clear_windows: 2        # 连续 N 个窗口低于重度才解除报警（迟滞清除）
  subscore:                     # 各子分 0..1 的归一化锚点（"达到该值记满分"）
    perclos_full: 0.40          # PERCLOS≥40% 眼部满分（P80 文献重度阈值）
    eye_closed_full_sec: 2.0    # 最长闭眼≥2s 满分（微睡眠量级）
    blink_rate_normal: 20       # 眨眼率≤20次/分 记 0 分（正常范围上限）
    blink_rate_full: 40         # 眨眼率≥40次/分 满分（频繁眨眼场景）
    yawn_count_full: 3          # 60s 窗口内哈欠≥3 次嘴部满分
    head_lowered_score: 0.7     # 持续低头的头部子分（固定值）
    head_tilted_score: 0.5      # 持续偏头的头部子分
    nod_count_full: 3           # 10s 窗口内点头≥3 次头部满分
    hr_drop_full_ratio: 0.15    # M4：心率较静息基线下降≥15% 生理满分

# ------------------------------- 预警行为（M3）------------------------------
alarm:
  sound_enable: true            # 报警声音开关（QSound 播放自动生成的提示音，
                                # 无音频后端时退回系统蜂鸣）
  popup_enable: true            # 重度报警弹窗开关（非模态，不阻塞检测）
  repeat_sec: 5.0               # 报警持续期间提示音重复间隔（秒）
  wav_path: ""                  # 自定义报警音 wav 路径；留空则自动在 outputs/
                                # 生成 alarm.wav（880/660Hz 双音 0.6s）

# ------------------------------- 数据记录（M3）------------------------------
logging:
  csv_dir: fatigue_system/outputs   # CSV 检测记录与会话汇总的输出目录
  log_interval_sec: 1.0             # CSV 落盘间隔（秒）
