# GitHub 自动打包 Windows exe
# ---------------------------------------------------------------------------
# 作用：不用自己有 Windows 电脑，GitHub 的 Windows 服务器会帮你把软件打成 exe。
# 怎么触发（两种）：
#   1) 在 GitHub 仓库页 → Actions 选本工作流 → 点 "Run workflow"（手动，最简单）；
#   2) 打一个版本标签自动触发：  git tag v1.0 && git push --tags
# 打完在哪拿：
#   * Actions 那次运行的页面底部 Artifacts 里下载 zip；
#   * 若是打 tag 触发，还会自动发布到仓库的 Releases 页，同学可直接下载。

name: 打包 Windows EXE

on:
  workflow_dispatch: {}          # 允许在网页上手动点按钮触发
  push:
    branches:
      - main                     # 推送到 main 就自动打包（调试期方便；稳定后可删掉这两行）
    tags:
      - 'v*'                      # 推送 v1.0 之类的标签时自动触发

permissions:
  contents: write                # 打 tag 时需要写 Release 的权限

jobs:
  build-exe:
    runs-on: windows-latest      # 关键：在 Windows 服务器上打，才能出 .exe
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r fatigue_system/packaging/requirements-app.txt

      - name: 打包
        run: pyinstaller --noconfirm fatigue_system/packaging/app.spec

      - name: 冒烟测试（CI 里离屏跑一下 exe，把诊断/报错打进日志）
        continue-on-error: true
        shell: cmd
        run: |
          cd dist\疲劳检测系统
          set QT_QPA_PLATFORM=offscreen
          疲劳检测系统.exe --selftest 2

      - name: 压缩成品
        run: Compress-Archive -Path dist\* -DestinationPath FatigueDetection-Windows.zip

      - name: 上传成品（Actions 运行页可下载）
        uses: actions/upload-artifact@v4
        with:
          name: FatigueDetection-Windows-EXE
          path: FatigueDetection-Windows.zip

      - name: 打 tag 时自动发到 Releases 页
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: FatigueDetection-Windows.zip
